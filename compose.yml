# ローカル開発用 PostgreSQL
# 起動: docker compose up -d
# 停止: docker compose down   （データも消す場合は -v）
services:
  db:
    image: postgres:16
    container_name: poi-postgres
    environment:
      POSTGRES_DB: poidb
      POSTGRES_USER: poi
      POSTGRES_PASSWORD: poi
    # ホスト側は 5433 に公開（ローカルにネイティブ PostgreSQL があり 5432 が
    # 使用中の環境でも衝突しないようにするため）。コンテナ内は 5432 のまま。
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
